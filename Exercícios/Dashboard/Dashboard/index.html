<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste De Gráfico</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/sidebar.css">
    <link rel="stylesheet" href="./css/cards.css">
    <link rel="stylesheet" href="./css/graficos.css">

</head>
<body>
 <div class="dashboard">

    <!-- Barra lateral -->
    <aside class="sidebar">
        <h2>Campeonato</h2>

        <nav>
            <p>Dashboard</p>
            <p>Times</p>
            <p>Estatísticas</p>
            <p>Ranking</p>
        </nav>
    </aside>

    <!-- Conteúdo -->
    <main class="content">

        <h1>Dashboard do Campeonato</h1>

        <!-- Cards de informações -->
        <div class="cards">

            <div class="info-card">
                <h3>Pontos Totais</h3>
                <span>320</span>
            </div>

            <div class="info-card">
                <h3>Total de Gols</h3>
                <span>168 gols</span>
            </div>

            <div class="info-card">
                <h3>Times</h3>
                <span>16</span>
            </div>

            <div class="info-card">
                <h3>Jogos</h3>
                <span>72 jogos</span>
            </div>

        </div>

        <!-- Gráficos -->
        <div class="grid-graficos">

            <div class="grafico grande">
                <canvas id="myChart"></canvas>
            </div>

            <div class="grafico">
                <canvas id="Gr2"></canvas>
            </div>

            <div class="grafico">
                <canvas id="Gr4"></canvas>
            </div>

            <div class="grafico">
                <canvas id="Gr5"></canvas>
            </div>

            <div class="grafico">
                <canvas id="Gr3"></canvas>
            </div>

        </div>

    </main>

    <script type="module" src="./js/graficos.js"></script>
</body>
</html>
